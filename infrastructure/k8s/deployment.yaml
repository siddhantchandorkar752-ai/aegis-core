apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuro-core-deployment
  labels:
    app: neuro-core
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: neuro-core
  template:
    metadata:
      labels:
        app: neuro-core
    spec:
      containers:
      - name: neuro-core
        image: custom-repo/neuro-core:v1.0.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: REDIS_URL
          value: "redis://neuro-core-redis:6379"
        - name: PG_URL
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: URL
